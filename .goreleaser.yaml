version: 2

project_name: ccsm

before:
  hooks:
    - go mod tidy

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: checksums.txt

homebrew:
  - repository:
      owner: nemethk
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    homepage: https://github.com/nemethk/claude-code-session-manager
    description: Claude Code Session Manager — list, search, and browse saved Claude Code sessions

release:
  github:
    owner: nemethk
    name: claude-code-session-manager
